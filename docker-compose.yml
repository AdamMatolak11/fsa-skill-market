services:
  postgres:
    image: postgres:16-alpine
    container_name: skill-market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skill_market
      POSTGRES_USER: skill_market
      POSTGRES_PASSWORD: skill_market
    ports:
      - "5432:5432"
    volumes:
      - skill_market_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skill_market -d skill_market"]
      interval: 5s
      timeout: 3s
      retries: 10
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: skill-market-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak/realm-skill-market.json:/opt/keycloak/data/import/realm-skill-market.json:ro

volumes:
  skill_market_postgres_data:
