spring:
  datasource:
    url: jdbc:h2:mem:skill_market_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  liquibase:
    enabled: false
  sql:
    init:
      mode: always
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    mapping-resources:
      - persistence/skill-market-orm.xml
